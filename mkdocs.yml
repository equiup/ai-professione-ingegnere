site_name: AI Professione Ingegnere
site_description: Guida collaborativa all'Intelligenza Artificiale per la professione di Ingegnere.
site_author: C3I-ITA
site_url: https://c3i-ita.github.io/ai-professione-ingegnere/
repo_name: C3I-ITA/ai-professione-ingegnere
repo_url: https://github.com/C3I-ITA/ai-professione-ingegnere
edit_uri: edit/main/docs/

copyright: Copyright &copy; C3I-ITA - Comitato Italiano Ingegneria dell'Informazione

theme:
  name: material
  language: it
  logo: assets/images/logo-ai-professione-ingegnere.svg
  favicon: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Passa al tema scuro
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Passa al tema chiaro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search:
      lang: it
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true
  - mermaid2

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Manifesto:
      - manifesto/index.md
  - La Guida:
      - guida/index.md
      - Fondamenti:
          - guida/fondamenti/index.md
          - guida/fondamenti/ai-ml-dl.md
          - guida/fondamenti/generative-ai.md
          - guida/fondamenti/llm-rag-agenti.md
      - Professione:
          - guida/professione/index.md
          - guida/professione/ruolo-ingegnere.md
          - guida/professione/competenze.md
  - Toolbox:
      - toolbox/index.md
  - Playbooks:
      - playbooks/index.md
  - Prompt Library:
      - prompt-library/index.md
  - Normativa:
      - normativa/index.md
      - normativa/ai-act.md
      - normativa/gdpr.md
  - Standard:
      - standard/index.md
      - standard/iso-iec-42001.md
  - Template: template/index.md
  - Checklist: checklist/index.md
  - Casi d'uso: casi-uso/index.md
  - Academy: academy/index.md
  - Governance:
      - governance/index.md
      - governance/processo-editoriale.md
